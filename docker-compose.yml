services:
    n8n-editor:
        image: n8nio/n8n:1.122.4
        container_name: n8n-editor-ftr
        ports:
            - 5678:5678
        volumes:
            - n8n-data:/home/node/.n8n
        environment:
            - GENERIC_TIMEZONE=America/Sao_Paulo
            - TZ=America/Sao_Paulo
            - N8N_RUNNERS_ENABLED=true
            - N8N_GIT_NODE_DISABLE_BARE_REPOS=true
            - N8N_AVAILABLE_BINARY_DATA_MODES=filesystem
            - OPENWEATHER_API_KEY=[SUA_OPENWEATHER_API_KEY]
            - TELEGRAM_BOT_TOKEN=[SEU_TOKEN_TELEGRAM]

            # Modificados para liberar o acesso ao ambiente:
            - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
            - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=false
            - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS_IN_CODE=false
            - NODE_FUNCTION_ALLOW_ENV=OPENWEATHER_API_KEY,TELEGRAM_BOT_TOKEN

            ## Postgres
            - DB_TYPE=postgresdb
            - DB_POSTGRESDB_DATABASE=[NOME_DO_BANCO]
            - DB_POSTGRESDB_HOST=postgres
            - DB_POSTGRESDB_PORT=5432
            - DB_POSTGRESDB_USER=[USUARIO_POSTGRES]
            - DB_POSTGRESDB_PASSWORD=[SENHA_POSTGRES]

            ## Queue Mode
            - EXECUTIONS_MODE=queue
            - QUEUE_BULL_REDIS_HOST=redis
            - OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS=false

            ## Webhook
            - WEBHOOK_URL=[SUA_URL_NGROK]
        networks:
            - n8n-ftr
        depends_on:
            - postgres
            - redis
        restart: always

    n8n-worker:
        image: n8nio/n8n:1.122.4
        command: worker
        ports:
            - 5679:5678
        volumes:
            - n8n-data:/home/node/.n8n
        environment:
            - GENERIC_TIMEZONE=America/Sao_Paulo
            - TZ=America/Sao_Paulo
            - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
            - N8N_RUNNERS_ENABLED=true
            - N8N_GIT_NODE_DISABLE_BARE_REPOS=true
            - N8N_AVAILABLE_BINARY_DATA_MODES=filesystem

            - OPENWEATHER_API_KEY=[SUA_OPENWEATHER_API_KEY]
            - TELEGRAM_BOT_TOKEN=[SEU_TOKEN_TELEGRAM]

            # Modificados para liberar o acesso ao ambiente:
            - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
            - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=false
            - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS_IN_CODE=false
            - NODE_FUNCTION_ALLOW_ENV=OPENWEATHER_API_KEY,TELEGRAM_BOT_TOKEN

            ## Postgres
            - DB_TYPE=postgresdb
            - DB_POSTGRESDB_DATABASE=[NOME_DO_BANCO]
            - DB_POSTGRESDB_HOST=postgres
            - DB_POSTGRESDB_PORT=5432
            - DB_POSTGRESDB_USER=[USUARIO_POSTGRES]
            - DB_POSTGRESDB_PASSWORD=[SENHA_POSTGRES]

            ## Queue Mode
            - EXECUTIONS_MODE=queue
            - QUEUE_BULL_REDIS_HOST=redis
            - OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS=false

            ## Webhook
            - WEBHOOK_URL=[SUA_URL_NGROK]
        networks:
            - n8n-ftr
        depends_on:
            - postgres
            - redis
        restart: always

    postgres:
        image: ankane/pgvector
        ports:
            - 5432:5432
        volumes:
            - postgres-data:/var/lib/postgresql/data
        environment:
            - POSTGRES_PASSWORD=[SENHA_POSTGRES]
            - POSTGRES_DB=[NOME_DO_BANCO]
            - POSTGRES_USER=[USUARIO_POSTGRES]
        networks:
            - n8n-ftr
        restart: always

    redis:
        image: redis:alpine
        ports:
            - 6379:6379
        volumes:
            - redis-data:/data
        networks:
            - n8n-ftr
        restart: always

    ngrok:
        image: ngrok/ngrok:latest
        ports:
            - 4040:4040
        volumes:
            - ngrok-data:/etc
        command: http --domain=[SEU_DOMINIO_NGROK] n8n-editor-ftr:5678
        environment:
            - NGROK_AUTHTOKEN=[SEU_NGROK_AUTHTOKEN]
        restart: always
        networks:
            - n8n-ftr
        depends_on:
            - n8n-editor

networks:
    n8n-ftr:
        driver: bridge

volumes:
    n8n-data:
    postgres-data:
    redis-data:
    ngrok-data:
